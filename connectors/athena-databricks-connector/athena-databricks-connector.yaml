Transform: 'AWS::Serverless-2016-10-31'
Metadata:
  AWS::ServerlessRepo::Application:
    Name: DatabricksAthenaConnector
    Description: Databricks Athena Connector for querying data stored in Databricks Unity Catalog
    Author: 'AWS Labs'
    SpdxLicenseId: Apache-2.0
    LicenseUrl: LICENSE.txt
    ReadmeUrl: README.md
    Labels: ['athena-federation']
    HomePageUrl: https://github.com/awslabs/nx-neptune
    SemanticVersion: 0.1.0
    SourceCodeUrl: https://github.com/awslabs/nx-neptune
# Parameters are CloudFormation features to pass input
# to your template when you create a stack
Parameters:
  AthenaCatalogName:
    Description: 'This is the name of the lambda function that will be created. This name must satisfy the pattern ^[a-z0-9-_]{1,64}$'
    Type: String
    AllowedPattern: ^[a-z0-9-_]{1,64}$
    Default: databricks
  DatabricksHost:
    Description: "The Databricks workspace hostname (e.g. dbc-12ab3456-7cd8.cloud.databricks.com). Do not include https:// or port."
    Type: String
    AllowedPattern: ^[a-zA-Z0-9][a-zA-Z0-9.\-]+[a-zA-Z0-9]$
    ConstraintDescription: "Enter only the hostname (e.g. dbc-12ab3456-7cd8.cloud.databricks.com), not a full URL."
  DatabricksHttpPath:
    Description: "The HTTP path for the Databricks SQL warehouse API (e.g., /sql/1.0/warehouses/abc123)."
    Type: String
  SecretName:
    Description: "The name of the secret in AWS Secrets Manager that contains the Databricks personal access token."
    Type: String
  SpillBucket:
    Description: 'The name of the bucket where this function can spill data. Use only the bucket name (e.g. my-athena-spill), not the full S3 URI or ARN.'
    Type: String
    AllowedPattern: ^[a-z0-9][a-z0-9.\-]{1,61}[a-z0-9]$
    ConstraintDescription: 'Enter only the bucket name (e.g. my-athena-spill), not an S3 URI (s3://...) or ARN.'
  SpillPrefix:
    Description: 'The prefix within SpillBucket where this function can spill data.'
    Type: String
    Default: athena-spill
  LambdaTimeout:
    Description: "Maximum Lambda invocation runtime in seconds. (min 1 - 900 max)"
    Default: 900
    Type: Number
  LambdaMemory:
    Description: "Lambda memory in MB (min 128 - 3008 max)."
    Default: 1024
    Type: Number
  DatabricksConnCatalog:
    Description: "The Databricks Unity Catalog name to connect to."
    Type: String
    Default: workspace
  DatabricksFetchSize:
    Description: "Number of rows fetched per JDBC round trip. Higher values improve throughput but use more memory."
    Default: 10000
    Type: Number
  EnableArrow:
    Description: "Enable Arrow-based result serialization (Cloud Fetch). Disabled by default to prevent OOM in Lambda. Set to 1 to enable for higher throughput (requires more memory)."
    Default: 0
    Type: Number
    AllowedValues:
      - 0
      - 1
  DatabricksDefaultDatabase:
    Description: "The default Databricks Unity Catalog database (catalog.schema) to use when not specified in the query."
    Default: default
    Type: String
  DisableSpillEncryption:
    Description: "WARNING: If set to 'true' encryption for spilled data is disabled."
    Default: "false"
    Type: String
Resources:
  ConnectorConfig:
    Type: 'AWS::Serverless::Function'
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
    Properties:
      ImageUri: connectorconfig:v1
      Environment:
        Variables:
          databricks_host: !Ref DatabricksHost
          disable_spill_encryption: !Ref DisableSpillEncryption
          spill_bucket: !Ref SpillBucket
          spill_prefix: !Ref SpillPrefix
          secret_manager_databricks_token_name: !Ref SecretName
          databricks_default_database: !Ref DatabricksDefaultDatabase
          databricks_http_path: !Ref DatabricksHttpPath
          databricks_conn_catalog: !Ref DatabricksConnCatalog
          databricks_fetch_size: !Ref DatabricksFetchSize
          enable_arrow: !Ref EnableArrow
      FunctionName: !Sub "${AthenaCatalogName}"
      PackageType: Image
      ImageConfig:
        Command: ["com.amazonaws.athena.connectors.databricks.DatabricksCompositeHandler"]
      Description: "Federated connector to read data from Databricks Unity Catalog."
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Policies:
        - Statement:
            - Action:
                - athena:GetQueryExecution
              Effect: Allow
              Resource: !Sub 'arn:${AWS::Partition}:athena:${AWS::Region}:${AWS::AccountId}:workgroup/*'
          Version: '2012-10-17'
        - Statement:
            - Action:
                - secretsmanager:GetSecretValue
              Effect: Allow
              # The -* suffix is required because Secrets Manager appends a random 6-character
              # suffix to every secret ARN (e.g., my-secret-AbCdEf). Without it, the policy
              # won't match the actual secret ARN and access will be denied.
              Resource: !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*'
          Version: '2012-10-17'

        # S3CrudPolicy allows our connector to spill large responses to S3. You can optionally replace this pre-made policy
        # with one that is more restrictive and can only 'put' but not read,delete, or overwrite files.
        - S3CrudPolicy:
            BucketName: !Ref SpillBucket