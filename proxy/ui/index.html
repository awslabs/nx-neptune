<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph Studio — Data Lake Migration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-500: oklch(0.645 0.163 247.04);
    --brand-600: oklch(0.57 0.144 247.21);
    --brand-50: oklch(0.966 0.016 262.77);
    --gray-50: #fafafa;
    --gray-100: #f4f4f5;
    --gray-200: #e4e4e7;
    --gray-300: #d4d4d8;
    --gray-600: #52525b;
    --gray-900: #18181b;
    --success: #10b981;
    --success-bg: #ecfdf5;
    --danger: #ef4444;
    --danger-bg: #fef2f2;
    --radius: 6px;
    --font: "Nunito Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); font-size: 14px; color: var(--gray-900); background: #fff; }
  .container { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
  .subtitle { color: var(--gray-600); margin-bottom: 2rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-weight: 600; font-size: 0.8rem; margin-bottom: 0.25rem; color: var(--gray-900); }
  .form-group input, .form-group textarea {
    width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-300);
    border-radius: var(--radius); font-size: 0.875rem; font-family: var(--font);
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none; border-color: var(--brand-500); box-shadow: 0 0 0 2px var(--brand-50);
  }
  .form-group input[readonly] { background: var(--gray-100); color: var(--gray-600); cursor: default; }
  .form-group textarea { height: 80px; font-family: monospace; font-size: 0.8rem; }
  .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border: none; border-radius: var(--radius); font-size: 0.875rem; font-weight: 600; font-family: var(--font); cursor: pointer; transition: background 0.15s; }
  .btn-primary { background: var(--brand-500); color: #fff; }
  .btn-primary:hover { background: var(--brand-600); }
  .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #059669; }
  .btn-outline { background: #fff; color: var(--gray-900); border: 1px solid var(--gray-300); }
  .btn-outline:hover { background: var(--gray-50); }
  .btn-group { display: flex; gap: 0.5rem; margin-top: 1.5rem; flex-wrap: wrap; }
  .section { margin-top: 1.5rem; padding: 1rem; border: 1px solid var(--gray-200); border-radius: var(--radius); }
  .section-title { font-weight: 600; font-size: 0.8rem; margin-bottom: 0.75rem; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.05em; }
  .progress-bar { width: 100%; height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--brand-500); transition: width 0.3s; }
  .status-text { margin-top: 0.5rem; font-size: 0.8rem; color: var(--gray-600); }
  .error-text { margin-top: 0.5rem; color: var(--danger); font-size: 0.8rem; }
  .result-card { margin-top: 1rem; padding: 1rem; background: var(--success-bg); border: 1px solid var(--success); border-radius: var(--radius); }
  .result-card code { font-size: 0.8rem; background: #fff; padding: 0.2rem 0.4rem; border-radius: 3px; }
  .check-row { padding: 0.3rem 0; font-size: 0.8rem; border-bottom: 1px solid var(--gray-100); }
  .check-pass { color: var(--success); }
  .check-fail { color: var(--danger); }
  .hidden { display: none; }
  .nav { margin-bottom: 1.5rem; font-size: 0.8rem; display: flex; gap: 1rem; }
  .nav a { color: var(--brand-500); text-decoration: none; font-weight: 500; }
  .nav a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>Graph Studio</h1>
  <p class="subtitle">Migrate data from S3/Athena to Neptune Analytics</p>
  <nav class="nav"><a href="/query-builder.html">Query Builder</a><a href="/graphs.html">Graphs</a></nav>

  <form id="setup-form">
    <div class="form-group">
      <label>AWS Catalog</label>
      <input name="athenaCatalog" value="AwsDataCatalog" placeholder="AwsDataCatalog">
    </div>
    <div class="form-group">
      <label>Athena Database</label>
      <input name="athenaDatabase" required>
    </div>
    <div class="form-group">
      <label>SQL Projection</label>
      <textarea name="sqlQuery" required placeholder="SELECT ~id, ~label, col1, col2 FROM my_table"></textarea>
    </div>
    <div class="form-group">
      <label>S3 Staging Bucket</label>
      <input name="csvStagingBucket" required placeholder="s3://my-bucket/neptune-import/">
    </div>
    <div class="form-group">
      <label>Graph Name</label>
      <input name="graphName" required placeholder="my-graph">
    </div>
    <div class="form-group">
      <label>AWS Region</label>
      <input name="region" value="us-east-1" required>
    </div>
    <div class="form-group">
      <label>Graph Memory (GB)</label>
      <input name="graphMemoryGb" type="number" value="16" min="16" step="16">
    </div>
    <div class="form-group">
      <label>Graph Endpoint</label>
      <input id="graph-endpoint" readonly placeholder="Populated after migration completes">
    </div>
  </form>

  <div class="btn-group">
    <button type="button" id="test-btn" class="btn btn-outline">Test Connection</button>
    <button type="button" id="run-btn" class="btn btn-primary">Run Migration</button>
  </div>

  <div id="validation-section" class="section hidden">
    <div class="section-title">Connection Test Results</div>
    <div id="validation-results"></div>
  </div>

  <div id="progress-section" class="section hidden">
    <div class="section-title">Pipeline Progress</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="status-text" id="status-text"></div>
    <div class="error-text" id="error-text"></div>
    <div id="result" class="hidden"></div>
  </div>
</div>

<script>
const form = document.getElementById('setup-form');
const testBtn = document.getElementById('test-btn');
const runBtn = document.getElementById('run-btn');
const validationSection = document.getElementById('validation-section');
const validationResults = document.getElementById('validation-results');
const progressSection = document.getElementById('progress-section');
const progressFill = document.getElementById('progress-fill');
const statusText = document.getElementById('status-text');
const errorText = document.getElementById('error-text');
const resultDiv = document.getElementById('result');
const graphEndpointInput = document.getElementById('graph-endpoint');

function getFormData() {
  const data = Object.fromEntries(new FormData(form));
  data.graphMemoryGb = parseInt(data.graphMemoryGb);
  return data;
}

function checkRequired() {
  return form.reportValidity();
}

// Test Connection
testBtn.addEventListener('click', async () => {
  if (!checkRequired()) return;
  testBtn.disabled = true;
  testBtn.textContent = 'Testing...';
  validationSection.classList.remove('hidden');
  validationResults.innerHTML = '';

  try {
    const res = await fetch('/api/v0/datasource/test', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(getFormData()),
    });
    const data = await res.json();
    validationResults.innerHTML = (data.checks || []).map(c =>
      `<div class="check-row ${c.passed ? 'check-pass' : 'check-fail'}">${c.passed ? '✓' : '✗'} ${c.service}: ${c.message}</div>`
    ).join('');
  } catch (e) {
    validationResults.innerHTML = `<div class="check-row check-fail">✗ ${e.message}</div>`;
  }
  testBtn.disabled = false;
  testBtn.textContent = 'Test Connection';
});

// Run Migration
runBtn.addEventListener('click', async () => {
  if (!checkRequired()) return;
  runBtn.disabled = true;
  progressSection.classList.remove('hidden');
  errorText.textContent = '';
  resultDiv.classList.add('hidden');

  try {
    const res = await fetch('/api/v0/datasource/setup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(getFormData()),
    });
    if (!res.ok) {
      const err = await res.json();
      errorText.textContent = err.detail || 'Setup failed';
      runBtn.disabled = false;
      return;
    }
    pollStatus();
  } catch (e) {
    errorText.textContent = e.message;
    runBtn.disabled = false;
  }
});

async function pollStatus() {
  try {
    const res = await fetch('/api/v0/datasource/setup/status');
    const status = await res.json();

    progressFill.style.width = (status.progress || 0) + '%';
    statusText.textContent = status.stepLabel || status.step || '';

    if (status.status === 'complete') {
      graphEndpointInput.value = status.graphEndpoint || '';
      resultDiv.classList.remove('hidden');
      const graphName = form.querySelector('[name="graphName"]').value;
      const proxyUrl = window.location.origin;
      resultDiv.innerHTML = `<div class="result-card"><strong>✓ Graph ready</strong><br>Endpoint: <code>${status.graphEndpoint}</code></div>`;
      // Fetch GE URL and show redirect button
      fetch('/api/v0/config').then(r => r.json()).then(config => {
        const params = new URLSearchParams({
          action: 'create',
          proxyUrl: proxyUrl,
          graphEndpoint: status.graphEndpoint,
          connectionName: graphName,
        });
        const geUrl = `${config.graphExplorerUrl}/connections?${params}`;
        resultDiv.innerHTML += `<div style="margin-top:0.75rem;"><a href="${geUrl}" class="btn btn-primary">Open in Graph Explorer →</a></div>`;
      });
      runBtn.disabled = false;
      return;
    }

    if (status.status === 'failed') {
      errorText.textContent = '✗ ' + (status.error || 'Pipeline failed');
      runBtn.disabled = false;
      return;
    }

    setTimeout(pollStatus, 5000);
  } catch (e) {
    errorText.textContent = e.message;
    runBtn.disabled = false;
  }
}
</script>
</body>
</html>
